name: Weekly Pulse

on:
  # Triggered by macOS LaunchAgent (com.argus.weekly-pulse-scheduler)
  # every Thursday at 1:00pm ET, 1hr after Cat's AAET baseline report.
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Number of days to look back'
        required: false
        default: '7'
        type: string

# This pipeline ONLY generates the draft. Publishing happens interactively
# via the weekly-pulse-review Argus skill in Cursor (Slack MCP sweep →
# enrich → approve → publish to Google Doc).

jobs:
  generate-highlights:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure GCP credentials for Vertex AI
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "$GCP_CREDENTIALS" > /tmp/gcp_credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_credentials.json" >> $GITHUB_ENV

      - name: Generate highlights
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ANTHROPIC_VERTEX_PROJECT_ID: itpc-gcp-ai-eng-claude
          ANTHROPIC_VERTEX_REGION: us-east5
        run: python generate.py --days-back ${{ github.event.inputs.days_back || '7' }} --skip-slack

      - name: Upload draft as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-pulse-${{ github.run_id }}
          path: output/
          retention-days: 30

      - name: Commit output
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f output/
          git diff --staged --quiet || git commit -m "pulse: $(date +%Y-%m-%d) weekly highlights"
          git push

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/gcp_credentials.json
