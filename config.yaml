  # Requires a Slack user token with search:read scope.
  days_back: 7

llm:
  # Uses Anthropic via Vertex AI (same as Cat's report generator)
  vertex_project: itpc-gcp-ai-eng-claude
  vertex_region: us-east5
  model: claude-sonnet-4-6

output:
