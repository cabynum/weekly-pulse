  aaet_report:
    owner: catrobson
    repo: AAET-Weekly-Status
    report_path: reports/

jira:
  base_url: https://redhat.atlassian.net
  component: Data Processing
  projects:
    - RHAIENG
    - RHAISTRAT
    - RHOAIENG
    - RHAIRFE

slack:
